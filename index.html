<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AH Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAF8;--bg2:#F4F3F0;--card:#fff;--brd:#E8E6E1;--brd2:#D4D1CA;--t1:#1C1917;--t2:#57534E;--t3:#A8A29E;--nv:#0A1A2F;--nv2:rgba(10,26,47,0.06);--grn:#166534;--grn-bg:#EAF3DE;--blu:#1D4ED8;--blu-bg:#E6F1FB;--pur:#6D28D9;--pur-bg:#EEEDFE;--amb:#B45309;--amb-bg:#FAEEDA;--red:#B91C1C;--red-bg:#FCEBEB;--gry:#78716C;--gry-bg:#F1EFE8;--r:6px;--rl:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex}
.auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}.auth.hid{opacity:0;pointer-events:none}.auth-box{text-align:center;width:300px}.auth-box .br{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:20px}.auth-box h1{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:4px;color:var(--nv)}.auth-box p{font-size:12px;color:var(--t3);margin-bottom:24px}.auth-in{width:100%;font-family:'Outfit',sans-serif;font-size:13px;padding:11px 14px;border-radius:var(--r);border:1px solid var(--brd);background:var(--bg2);color:var(--t1);outline:none;text-align:center;letter-spacing:2px}.auth-in:focus{border-color:var(--nv)}.auth-err{font-size:11px;color:var(--red);margin-top:8px;height:16px}
.app{display:none;flex:1}.app.on{display:flex}
.sb{width:54px;background:var(--nv);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;flex-shrink:0}.sb-logo{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;margin-bottom:10px}.sb-logo div{width:10px;height:10px;border-radius:2px;background:#fff}.sb-btn{width:36px;height:36px;border-radius:7px;border:none;background:transparent;color:rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}.sb-btn:hover{color:rgba(255,255,255,.6);background:rgba(255,255,255,.05)}.sb-btn.on{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85)}.sb-spacer{flex:1}.sb-lang{width:36px;height:20px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;letter-spacing:.5px}.sb-lang:hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}.topbar{padding:14px 20px 0;display:flex;align-items:center;justify-content:space-between}.topbar .br{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--t3)}.topbar h1{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--nv);margin-top:1px}.btn-imp{font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;padding:6px 14px;border-radius:14px;border:1px solid var(--brd);background:var(--card);color:var(--t1);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}.btn-imp:hover{border-color:var(--nv);color:var(--nv)}.btn-p{font-size:11px;font-weight:600;padding:7px 16px;border-radius:14px;border:none;background:var(--nv);color:#fff;cursor:pointer;font-family:'Outfit',sans-serif}.btn-p:hover{opacity:.85}
.alerts{padding:10px 20px 0;display:flex;gap:8px;flex-wrap:wrap;font-size:11px}.al{padding:3px 10px;border-radius:10px;font-weight:500}
.tb{padding:8px 20px 4px;display:flex;flex-direction:column;gap:6px}.tb-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap}.tb-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);min-width:48px;flex-shrink:0}.pill{font-family:'Outfit',sans-serif;font-size:10px;font-weight:500;padding:3px 9px;border-radius:12px;border:1px solid var(--brd);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s;white-space:nowrap}.pill:hover{color:var(--t2);border-color:var(--brd2)}.pill.on{background:var(--nv);color:#fff;border-color:var(--nv)}.pill-s.on[data-f="prospect"]{background:var(--blu);border-color:var(--blu)}.pill-s.on[data-f="in_progress"]{background:var(--pur);border-color:var(--pur)}.pill-s.on[data-f="onboarding"]{background:var(--amb);border-color:var(--amb)}.pill-s.on[data-f="partner"]{background:var(--grn);border-color:var(--grn)}.pill-s.on[data-f="lost"]{background:var(--red);border-color:var(--red)}.pill-fl.on{background:var(--nv);color:#fff;border-color:var(--nv)}.pill-st{font-size:9px;padding:2px 7px}.pill-st .ct{font-family:'JetBrains Mono',monospace;font-size:8px;margin-left:2px;opacity:.6}
.geo-wrap{position:relative}.geo-toggle{font-family:'Outfit',sans-serif;font-size:10px;font-weight:500;padding:3px 9px;border-radius:12px;border:1px solid var(--brd);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}.geo-toggle:hover{color:var(--t2);border-color:var(--brd2)}.geo-toggle.has{background:var(--nv);color:#fff;border-color:var(--nv)}.geo-drop{display:none;position:absolute;top:100%;left:0;margin-top:4px;background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:10px;z-index:100;min-width:440px;max-height:340px;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.1)}.geo-drop.open{display:block}.geo-sec{margin-bottom:8px}.geo-sec:last-child{margin-bottom:0}.geo-rn{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}.geo-rn .geo-sel{font-size:8px;font-weight:500;cursor:pointer;text-transform:none;letter-spacing:0}.geo-rn .geo-sel:hover{color:var(--t2)}.geo-pills{display:flex;flex-wrap:wrap;gap:3px}
.srch{min-width:140px;position:relative;flex:1}.srch input{width:100%;font-family:'Outfit',sans-serif;font-size:11px;padding:6px 10px 6px 28px;border-radius:14px;border:1px solid var(--brd);background:var(--bg2);color:var(--t1);outline:none}.srch input:focus{border-color:var(--nv)}.srch input::placeholder{color:var(--t3)}.srch svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3)}.filter-count{font-family:'JetBrains Mono',monospace;font-size:9px;background:var(--amb);color:#fff;padding:1px 5px;border-radius:8px;font-weight:600}
.vpan{display:none;flex:1;padding:0 20px 20px;overflow-y:auto}.vpan.on{display:block}
.kan{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}.kcol{background:var(--bg2);border-radius:var(--rl);padding:8px}.kch{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 3px}.kct{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}.kcn{font-size:9px;font-weight:600;padding:2px 6px;border-radius:8px}.kc{background:var(--card);border:0.5px solid var(--brd);border-radius:0 var(--r) var(--r) 0;padding:10px;margin-bottom:6px;cursor:pointer;transition:all .15s}.kc:last-child{margin-bottom:0}.kc:hover{border-color:var(--brd2);box-shadow:0 2px 8px rgba(0,0,0,.04);transform:translateY(-1px)}.kc-name{font-size:13px;font-weight:600;margin-bottom:2px}.kc-loc{font-size:10px;color:var(--t3);margin-bottom:4px}.kc-stars{font-size:11px;color:var(--nv);letter-spacing:.5px}.kc-badge{font-size:8px;font-weight:600;padding:2px 6px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px;display:inline-block;margin-left:4px}.kc-next{border-top:0.5px solid var(--brd);margin-top:6px;padding-top:6px}.kc-nl{font-size:9px;color:var(--t3)}.kc-na{font-size:11px;font-weight:500;margin-top:1px}.kc-nd{font-size:10px;margin-top:1px}.kc-nd.od{color:var(--red);font-weight:600}.kc-nd.ok{color:var(--t3)}.kc-rev{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--grn);margin-top:5px}.kc-note{font-size:10px;color:var(--t3);font-style:italic;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.kc-empty{text-align:center;padding:20px 6px;color:var(--t3);font-size:10px}
.lost-zone{background:var(--bg2);border-radius:var(--rl);padding:8px;margin-top:4px}.lost-zone .bzt{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;display:flex;align-items:center;gap:6px}.lost-zone .bzc{display:flex;flex-wrap:wrap;gap:6px}.bzcard{background:var(--card);border:0.5px solid var(--brd);border-radius:0 var(--r) var(--r) 0;padding:9px 10px;cursor:pointer;transition:all .15s;min-width:170px;flex:1}.bzcard:hover{border-color:var(--brd2);box-shadow:0 2px 8px rgba(0,0,0,.04)}.bz-empty{text-align:center;padding:14px;color:var(--t3);font-size:10px}
.map-wrap{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);height:100%;min-height:500px;overflow:hidden}.map-wrap .leaflet-container{height:100%;width:100%;border-radius:var(--rl)}.hub-tooltip{background:rgba(10,26,47,.9) !important;color:#fff !important;border:none !important;border-radius:6px !important;padding:3px 8px !important;font-family:Outfit,sans-serif !important;font-size:10px !important;font-weight:500 !important}.hub-tooltip:before{border-top-color:rgba(10,26,47,.9) !important}.mpop-name{font-family:'Playfair Display',serif;font-weight:700;font-size:13px;margin-bottom:3px}.mpop-d{font-family:'Outfit',sans-serif;font-size:11px;color:var(--t2);line-height:1.6}.mpop-d strong{color:var(--t1)}.mpop-btn{font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;margin-top:6px;padding:4px 12px;border-radius:8px;border:none;background:var(--nv);color:#fff;cursor:pointer}
.lt{width:100%;border-collapse:collapse;font-size:11px}.lt th{text-align:left;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);padding:6px 8px;border-bottom:2px solid var(--brd);cursor:pointer;user-select:none;white-space:nowrap}.lt th:hover{color:var(--t2)}.lt th .sa{font-size:8px;margin-left:2px;opacity:.4}.lt th.so .sa{opacity:1}.lt td{padding:8px;border-bottom:0.5px solid var(--brd);vertical-align:middle}.lt tr:hover{background:var(--bg2);cursor:pointer}.lt tr:last-child td{border-bottom:none}
.mo{display:none;position:fixed;inset:0;background:rgba(28,25,23,.3);backdrop-filter:blur(3px);z-index:10000;align-items:center;justify-content:center}.mo.open{display:flex}.mo-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:24px;width:540px;max-width:94vw;max-height:88vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.1);animation:mIn .2s ease-out}@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:none}}.mo-box h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:16px;color:var(--nv)}.fg{margin-bottom:10px}.fg label{display:block;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t2);margin-bottom:3px}.fg input,.fg select,.fg textarea{width:100%;font-family:'Outfit',sans-serif;font-size:12px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--brd);background:var(--bg2);color:var(--t1);outline:none;transition:border-color .2s}.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--nv)}.fg textarea{resize:vertical;min-height:44px}.fg select{cursor:pointer}.fr{display:grid;gap:8px}.fr2{grid-template-columns:1fr 1fr}.fr3{grid-template-columns:1fr 1fr 1fr}.fsep{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin:14px 0 8px;padding-top:10px;border-top:0.5px solid var(--brd)}.mo-ft{display:flex;gap:6px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:0.5px solid var(--brd)}.mo-ft .del{margin-right:auto;font-family:'Outfit',sans-serif;font-size:10px;padding:7px 12px;border-radius:var(--r);border:1px solid var(--red-bg);background:transparent;color:var(--red);cursor:pointer}.mo-ft .del:hover{background:var(--red-bg)}.btn-c{font-family:'Outfit',sans-serif;font-size:11px;padding:7px 16px;border-radius:var(--r);border:1px solid var(--brd);background:transparent;color:var(--t2);cursor:pointer}.btn-s{font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;padding:7px 18px;border-radius:var(--r);border:none;background:var(--nv);color:#fff;cursor:pointer}
.csv-drop{border:2px dashed var(--brd);border-radius:var(--r);padding:28px 14px;text-align:center;cursor:pointer;transition:all .2s}.csv-drop:hover,.csv-drop.ov{border-color:var(--nv);background:var(--nv2)}.csv-drop p{font-size:12px;color:var(--t2);margin-top:6px}.csv-drop span{font-size:10px;color:var(--t3)}.csv-mode-btn{font-size:11px !important;flex:1;text-align:center}.csv-mode-btn.on{background:var(--nv) !important;color:#fff !important;border-color:var(--nv) !important}.csv-res{margin-top:12px;padding:10px;background:var(--grn-bg);border-radius:var(--r);font-size:12px;color:var(--grn);font-weight:500}
.toast{position:fixed;bottom:16px;right:16px;padding:8px 16px;border-radius:var(--r);font-size:11px;font-weight:500;color:#fff;background:var(--nv);box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(50px);opacity:0;transition:all .3s;z-index:10001}.toast.show{transform:translateY(0);opacity:1}.toast.err{background:var(--red)}
.rp-h{font-size:13px;font-weight:600;color:#0A1A2F;margin-bottom:8px}
.rp-hub{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:0.5px solid #E8E6E1;font-size:11px}
.rp-hub:last-of-type{border:none}
.rp-hub .n{font-weight:500}
.rp-hub .c{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px}
.rp-hub .x{width:16px;height:16px;border-radius:50%;border:none;background:#FCEBEB;color:#B91C1C;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:4px;flex-shrink:0;padding:0}
.rp-hub .x:hover{background:#B91C1C;color:#fff}
.rp-total{display:flex;justify-content:space-between;padding:6px 0;border-top:0.5px solid #E8E6E1;margin-top:4px;font-size:11px}
.rp-total .c{font-family:'JetBrains Mono',monospace;font-weight:600}
.rp-total .g{color:#166534}
.rp-total .r{color:#B91C1C}
.rp-slider{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:0.5px solid #E8E6E1}
.rp-slider label{font-size:10px;color:#78716C}
.rp-slider input{flex:1}
.rp-slider span{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;min-width:52px;text-align:right;flex-shrink:0}
.rp-heat-legend{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:8px;color:#78716C}.rp-heat-bar{width:60px;height:5px;border-radius:3px;background:linear-gradient(90deg,#42A5F5,#EF5350)}
.rp-add{margin-top:8px;width:100%;font-family:'Outfit',sans-serif;font-size:10px;padding:5px 0;border-radius:6px;border:1.5px dashed #D4D1CA;background:transparent;color:#78716C;cursor:pointer;text-align:center}
.rp-add:hover{border-color:#0A1A2F;color:#0A1A2F}
@media(max-width:900px){.kan{grid-template-columns:1fr 1fr}}@media(max-width:640px){.kan{grid-template-columns:1fr}.topbar,.alerts,.tb,.vpan{padding-left:12px;padding-right:12px}.sb{width:44px}.geo-drop{min-width:300px;right:0;left:auto}}
</style>
</head>
<body>
<div class="auth" id="auth"><div class="auth-box"><div class="br">ThePackengers</div><h1 style="font-family:'Playfair Display',serif">AH Tracker</h1><p>CRM — Restricted access</p><input type="password" class="auth-in" id="auth-pw" placeholder="• • • • • •" autofocus><div class="auth-err" id="auth-err"></div></div></div>
<div class="app" id="app">
<nav class="sb"><div class="sb-logo"><div></div></div><button class="sb-btn on" data-v="kanban" title="Kanban"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="10" rx="1"/></svg></button><button class="sb-btn" data-v="map" title="Map"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/></svg></button><button class="sb-btn" data-v="list" title="List"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button><button class="sb-btn" data-v="radius" title="Radius"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><line x1="12" y1="12" x2="19" y2="8" stroke-dasharray="2 2"/></svg></button><div style="width:24px;height:1px;background:rgba(255,255,255,.1);margin:6px 0"></div><button class="sb-btn" id="sb-exp" title="Export"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button><label class="sb-btn" title="Restore backup (JSON)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 119 9"/><polyline points="3 21 3 12 12 12"/></svg><input type="file" id="json-imp" accept=".json" style="display:none"></label><div class="sb-spacer"></div><button class="sb-lang" id="lang-btn" title="Language">EN</button></nav>

function applyLang(){const L=t();document.getElementById('btn-add').textContent=L.addBtn;document.getElementById('btn-csv-label').textContent=L.impBtn;document.getElementById('lbl-name').textContent=L.modal.name;document.getElementById('lbl-addr').textContent=L.modal.addr;document.getElementById('lbl-city').textContent=L.modal.city;document.getElementById('lbl-state').textContent=L.modal.state;document.getElementById('lbl-pipe-sep').textContent=L.modal.pipeSep;document.getElementById('lbl-status').textContent=L.modal.status;document.getElementById('lbl-integ').textContent=L.modal.integ;document.getElementById('lbl-next-sep').textContent=L.modal.nextSep;document.getElementById('lbl-due').textContent=L.modal.due;document.getElementById('fsep-ref').textContent=L.modal.refSep;document.getElementById('lbl-reason').textContent=L.modal.reason;document.getElementById('lbl-retry').textContent=L.modal.retry;document.getElementById('lbl-refnotes').textContent=L.modal.refNotes;document.getElementById('lbl-contact-sep').textContent=L.modal.contactSep;document.getElementById('lbl-cn').textContent=L.modal.cn;document.getElementById('lbl-cp').textContent=L.modal.cp;document.getElementById('btn-save').textContent=L.modal.save;document.getElementById('btn-cancel').textContent=L.modal.cancel;document.getElementById('btn-del').textContent=L.modal.del;document.getElementById('lbl-ship').textContent=lang==='en'?'In-house shipping (not eligible)':'Shipping interne (non éligible)';document.getElementById('lbl-onla').textContent=lang==='en'?'On LiveAuctioneers':'Sur LiveAuctioneers';document.getElementById('lbl-dealer').textContent=lang==='en'?'Dealer Tool Access':'Accès Dealer Tool';document.getElementById('csv-title').textContent=L.csv.title;document.getElementById('csv-desc').textContent=L.csv.desc;document.getElementById('csv-drop-text').textContent=L.csv.drop;document.getElementById('csv-drop-hint').textContent=L.csv.hint;document.getElementById('csv-close').textContent=L.csv.close;
document.getElementById('csv-mode-update-title').textContent=L.csv.modeUpdate;
document.getElementById('csv-mode-update-desc').textContent=L.csv.modeUpdateDesc;
document.getElementById('csv-mode-full-title').textContent=L.csv.modeFull;
document.getElementById('csv-mode-full-desc').textContent=L.csv.modeFullDesc;const ss=document.getElementById('f-status');ss.innerHTML='';STATUSES.forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=L.pipe[k];ss.appendChild(o);});const is=document.getElementById('f-integ');is.innerHTML='<option value="">—</option>';Object.entries(L.integ).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v;is.appendChild(o);});const rs=document.getElementById('f-reason');rs.innerHTML='<option value="">—</option>';Object.entries(L.reasons).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v;rs.appendChild(o);});}

if(sessionStorage.getItem('crm3_auth')==='ok')unlock();
document.getElementById('auth-pw').addEventListener('keydown',e=>{if(e.key==='Enter'){if(e.target.value===PW){sessionStorage.setItem('crm3_auth','ok');unlock();}else{document.getElementById('auth-err').textContent='Incorrect';e.target.value='';}}});
function unlock(){document.getElementById('auth').classList.add('hid');document.getElementById('app').classList.add('on');requestAnimationFrame(()=>requestAnimationFrame(init));}

let mdvs=JSON.parse(localStorage.getItem(SK)||'[]');
const GC_KEY='crm_geocache';
let _geoCache=JSON.parse(localStorage.getItem(GC_KEY)||'{}');

function _saveGeoCache(){try{localStorage.setItem(GC_KEY,JSON.stringify(_geoCache));}catch(e){}}
function u(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function sv(){localStorage.setItem(SK,JSON.stringify(mdvs))}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmt$(n){return'$'+Math.round(n).toLocaleString('en-US')}
function td(){return new Date().toISOString().slice(0,10)}
function od(d){return d&&d<td()}
function stars(n){return'\u2605'.repeat(n||0)+'\u2606'.repeat(5-(n||0))}

let fStatus='all',fFlags=new Set(),fStates=new Set(),fQ='';
function normState(m){return(m.state||'').trim().toUpperCase()||'?'}
function getStateCounts(){const c={};mdvs.forEach(m=>{const s=normState(m);c[s]=(c[s]||0)+1;});return c;}
function fil(){let r=[...mdvs];if(fStatus!=='all')r=r.filter(m=>m.status===fStatus);if(fFlags.size){r=r.filter(m=>{for(const f of fFlags){if(f==='ship'&&!m.inHouseShipping)return false;if(f==='onla'&&!m.onLiveAuctioneers)return false;if(f==='dealer'&&!m.dealerTool)return false;if(f==='push'&&m.integ!=='push')return false;if(f==='api'&&m.integ!=='api')return false;}return true;});}if(fStates.size)r=r.filter(m=>fStates.has(normState(m)));if(fQ){const q=fQ.toLowerCase();r=r.filter(m=>m.name.toLowerCase().includes(q)||(m.city||'').toLowerCase().includes(q)||(m.state||'').toLowerCase().includes(q));}return r;}

function buildToolbar(){const L=t(),tb=document.getElementById('toolbar'),sc=getStateCounts();let h='<div class="tb-row"><span class="tb-label">'+L.tb.status+'</span><button class="pill pill-s'+(fStatus==='all'?' on':'')+'" data-f="all">'+L.tb.all+'</button>';STATUSES.forEach(s=>{h+='<button class="pill pill-s'+(fStatus===s?' on':'')+'" data-f="'+s+'">'+L.pipe[s]+'</button>';});h+='</div>';
h+='<div class="tb-row"><span class="tb-label">'+L.tb.flags+'</span>';['ship','onla','dealer','push','api'].forEach(f=>{h+='<button class="pill pill-fl'+(fFlags.has(f)?' on':'')+'" data-flag="'+f+'">'+L.flags[f]+'</button>';});h+='</div>';
h+='<div class="tb-row"><span class="tb-label">'+L.tb.geo+'</span><div class="geo-wrap"><button class="geo-toggle'+(fStates.size?' has':'')+'" id="geo-btn">';if(fStates.size){const arr=[...fStates];h+=arr.length<=3?arr.join(', '):arr.slice(0,2).join(', ')+' +'+(arr.length-2);}else h+='\u25BE '+L.tb.geo;
h+='</button><div class="geo-drop" id="geo-drop">';
const knownStates=new Set();REGIONS.forEach(r=>r.states.forEach(s=>knownStates.add(s)));const otherStates=Object.keys(sc).filter(s=>!knownStates.has(s)&&sc[s]>0).sort();
REGIONS.forEach(reg=>{const swd=reg.states.filter(s=>sc[s]);if(!swd.length)return;const total=swd.reduce((a,s)=>a+(sc[s]||0),0);h+='<div class="geo-sec"><div class="geo-rn">'+reg.name+' <span style="opacity:.5">('+total+')</span><span class="geo-sel" data-reg="'+reg.id+'">'+L.tb.selAll+'</span></div><div class="geo-pills">';swd.forEach(s=>{h+='<button class="pill pill-st'+(fStates.has(s)?' on':'')+'" data-state="'+s+'">'+s+'<span class="ct">'+sc[s]+'</span></button>';});h+='</div></div>';});
if(otherStates.length){const total=otherStates.reduce((a,s)=>a+(sc[s]||0),0);h+='<div class="geo-sec"><div class="geo-rn">Other <span style="opacity:.5">('+total+')</span></div><div class="geo-pills">';otherStates.forEach(s=>{h+='<button class="pill pill-st'+(fStates.has(s)?' on':'')+'" data-state="'+s+'">'+s+'<span class="ct">'+sc[s]+'</span></button>';});h+='</div></div>';}
if(fStates.size)h+='<div style="margin-top:6px;text-align:right"><button class="pill" id="geo-clear" style="font-size:9px;color:var(--red);border-color:var(--red-bg)">\u2715 '+L.tb.clear+'</button></div>';
h+='</div></div><div class="srch"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="search" placeholder="'+L.search+'" value="'+esc(fQ)+'"></div></div>';
tb.innerHTML=h;updateFilterCount();}

function updateFilterCount(){const n=(fStatus!=='all'?1:0)+fFlags.size+fStates.size;const fcEl=document.getElementById('fc');if(n){fcEl.textContent=n+' filter'+(n>1?'s':'');fcEl.style.display='inline';}else fcEl.style.display='none';}

function initToolbarDelegation(){
const tb=document.getElementById('toolbar');
tb.addEventListener('click',function(e){
const b=e.target.closest('.pill-s');
if(b){fStatus=b.dataset.f;buildToolbar();renderAll();return;}
const fl=e.target.closest('.pill-fl');
if(fl){const f=fl.dataset.flag;if(fFlags.has(f))fFlags.delete(f);else fFlags.add(f);buildToolbar();renderAll();return;}
const st=e.target.closest('.pill-st');
if(st){const s=st.dataset.state;if(fStates.has(s))fStates.delete(s);else fStates.add(s);buildToolbar();renderAll();return;}
const sel=e.target.closest('.geo-sel');
if(sel){e.stopPropagation();const reg=REGIONS.find(r=>r.id===sel.dataset.reg);if(reg){const sc=getStateCounts();const swd=reg.states.filter(s=>sc[s]);const allSel=swd.every(s=>fStates.has(s));swd.forEach(s=>{if(allSel)fStates.delete(s);else fStates.add(s);});buildToolbar();renderAll();}return;}
const gc=e.target.closest('#geo-clear');
if(gc){fStates.clear();buildToolbar();renderAll();return;}
const geo=e.target.closest('#geo-btn');
if(geo){e.stopPropagation();const d=document.getElementById('geo-drop');if(d)d.classList.toggle('open');return;}
});
document.addEventListener('click',function(e){if(!e.target.closest('.geo-wrap')){const d=document.getElementById('geo-drop');if(d)d.classList.remove('open');}});
tb.addEventListener('input',function(e){if(e.target.id==='search'){fQ=e.target.value;clearTimeout(_searchTimer);_searchTimer=setTimeout(renderAll,200);}});
}

function ibadge(v){if(!v)return'';const L=t();const cs={simple:['var(--gry-bg)','var(--gry)'],push:['var(--blu-bg)','var(--blu)'],live:['var(--pur-bg)','var(--pur)'],api:['var(--grn-bg)','var(--grn)']};const c=cs[v]||cs.simple;return'<span class="kc-badge" style="background:'+c[0]+';color:'+c[1]+'">'+(L.integ[v]||v)+'</span>';}
function shipBadge(m){if(!m.inHouseShipping)return'';return'<span class="kc-badge" style="background:var(--red-bg);color:var(--red)">'+(lang==='en'?'In-house':'Ship. int.')+'</span>';}
function laBadge(m){if(!m.onLiveAuctioneers)return'';if(m.integ==='live')return'<span class="kc-badge" style="background:var(--pur-bg);color:var(--pur)">LA \u2713</span>';return'<span class="kc-badge" style="background:var(--amb-bg);color:var(--amb)">LA</span>';}

function parseCSVText(text){function parseLine(line,sep){const vals=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===sep&&!inQ){vals.push(cur.trim());cur='';}else cur+=c;}vals.push(cur.trim());return vals;}const fl=text.split('\n')[0];let commas=0,semis=0,inQ=false;for(const c of fl){if(c==='"')inQ=!inQ;if(!inQ){if(c===',')commas++;if(c===';')semis++;}}const sep=semis>commas?';':',';const lines=text.trim().split('\n');const hdrs=parseLine(lines[0],sep).map(h=>h.replace(/^"|"$/g,''));const rows=lines.slice(1).filter(l=>l.trim()).map(line=>{const vals=parseLine(line,sep);const row={};hdrs.forEach((h,i)=>{row[h]=(vals[i]||'').replace(/^"|"$/g,'');});return row;});return{hdrs,rows};}
async function processCSV(file){if(!file)return;try{const text=await file.text();if(csvImportMode==='full')await processCSVFull(text);else await processCSVUpdate(text);}catch(e){toast((lang==='en'?'Import error: ':'Erreur import: ')+e.message,1);console.error(e);}}
async function processCSVUpdate(text){
const{hdrs,rows}=parseCSVText(text);
const exact=n=>hdrs.find(h=>h===n);
const guess=cs=>hdrs.find(h=>cs.some(c=>h.toLowerCase().replace(/[\s_-]/g,'').includes(c)));
const colName=exact('Name')||guess(['auctionhouse','name'])||hdrs[0];
const colCity=exact('City')||guess(['city'])||'';
const colState=exact('State')||guess(['state'])||'';
const colAddr=exact('Address')||guess(['address'])||'';
const colWeb=exact('Website')||guess(['website'])||'';
const colStatus=exact('Status')||guess(['status'])||'';
const colInteg=exact('Integration')||guess(['integration'])||'';
const colScore=exact('Score')||guess(['score'])||'';
const colShip=exact('In-House Ship.')||guess(['inhouseship'])||'';
const colLA=exact('LiveAuctioneers Program')||guess(['liveauctioneers'])||'';
const colLiveShip=exact('Live Ship. Partner')||guess(['liveship'])||'';
const colDealer=exact('Dealer Tool')||guess(['dealertool'])||'';
const colCN=exact('Contact Name')||guess(['contactname'])||'';
const colCE=exact('Contact Email')||guess(['contactemail'])||'';
const colCP=exact('Contact Phone')||guess(['contactphone'])||'';
const colAction=exact('Action')||guess(['action'])||'';
const colDue=exact('Due Date')||guess(['duedate'])||'';
const colReason=exact('Loss Reason')||guess(['lossreason'])||'';
const colRetry=exact('Retry Date')||guess(['retrydate'])||'';
const colRev=exact('Revenue $/mo')||guess(['revenue'])||'';
const colOrders=exact('Orders')||guess(['orders'])||'';
const colSLY=exact('Sales Last Year')||guess(['saleslastyear'])||'';
const colNote=exact('Notes')||guess(['note','notes'])||'';
const colLinkedin=exact('LinkedIn')||guess(['linkedin'])||'';
const isYes=v=>{const s=(v||'').trim().toLowerCase();return s==='yes'||s==='oui'||s==='true';};
const nameMap={};mdvs.forEach(m=>{nameMap[m.name.trim().toLowerCase()]=m;});
let updated=0,added=0,skipped=0;
const toGeocode=[];
rows.forEach(row=>{
const name=(row[colName]||'').trim();if(!name)return;
const key=name.toLowerCase();
const existing=nameMap[key];
if(existing){
  if(colStatus){const v=(row[colStatus]||'').trim().toLowerCase();if(v&&['prospect','in_progress','onboarding','partner','lost'].includes(v))existing.status=v;}
  if(colInteg)existing.integ=(row[colInteg]||'').trim();
  if(colScore){const v=parseInt(row[colScore]);if(v>=1&&v<=5)existing.score=v;}
  if(colShip)existing.inHouseShipping=isYes(row[colShip]);
  if(colLA)existing.onLiveAuctioneers=isYes(row[colLA]);
  if(colLiveShip)existing.liveShippingPartner=isYes(row[colLiveShip]);
  if(colDealer)existing.dealerTool=isYes(row[colDealer]);
  if(colCN){const v=(row[colCN]||'').trim();if(v){if(!existing.contact)existing.contact={n:'',e:'',p:''};existing.contact.n=v;}}
  if(colCE){const v=(row[colCE]||'').trim();if(v){if(!existing.contact)existing.contact={n:'',e:'',p:''};existing.contact.e=v;}}
  if(colCP){const v=(row[colCP]||'').trim();if(v){if(!existing.contact)existing.contact={n:'',e:'',p:''};existing.contact.p=v;}}
  if(colAction)existing.action=(row[colAction]||'').trim();
  if(colDue)existing.due=(row[colDue]||'').trim();

function processCSVRevenue(text){const{hdrs,rows}=parseCSVText(text);const guess=cs=>hdrs.find(h=>cs.some(c=>h.toLowerCase().replace(/[\s_-]/g,'').includes(c)));const colO=guess(['ownername','owner','name'])||hdrs[0];const colP=guess(['finalprice','final','price','amount'])||hdrs[1];const byO={};let parsed=0;rows.forEach(row=>{const owner=(row[colO]||'').trim();const price=parseFloat(String(row[colP]).replace(/[^0-9.\-]/g,''))||0;if(!owner)return;if(!byO[owner])byO[owner]={orders:0,revenue:0};byO[owner].orders++;byO[owner].revenue+=price;parsed++;});let matched=0,unm=[];Object.entries(byO).forEach(([owner,data])=>{const mdv=mdvs.find(m=>m.name.toLowerCase()===owner.toLowerCase());if(mdv){mdv.revenue=Math.round(data.revenue);mdv.orderCount=data.orders;mdv.lastOrder=td();matched++;}else{unm.push(owner);}});sv();buildToolbar();renderAll();const resEl=document.getElementById('csv-res');const CL=t().csv;let msg='\u2713 '+parsed+' '+CL.orders+' \u2192 '+matched+' '+CL.matched;if(unm.length)msg+='<br><span style="color:var(--amb)">\u26A0 '+unm.length+' '+CL.unmatched+': '+unm.slice(0,4).join(', ')+(unm.length>4?'\u2026':'')+'</span>';resEl.innerHTML=msg;resEl.style.display='block';toast(CL.updated+' \u2014 '+matched+' MDVs');}

let rmap=null,rCircles=[],rMarkers=[],rClickMode=false;

let rHubs=[...DEFAULT_HUBS.map(h=>({...h}))];
let rRadius=60;
let rHeatmap=false;

function haversine(lat1,lon1,lat2,lon2){const R=3959,dLat=Math.PI/180*(lat2-lat1),dLon=Math.PI/180*(lon2-lon1),a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.asin(Math.sqrt(a));}

function initRadius(){
  if(!rmap){
    rmap=L.map('rmap',{zoomControl:true}).setView([39,-96],4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'\u00A9 OSM \u00A9 CARTO',maxZoom:18}).addTo(rmap);
    const leg=L.control({position:'bottomleft'});
    leg.onAdd=function(){const d=L.DomUtil.create('div');d.style.cssText='background:rgba(255,255,255,.92);backdrop-filter:blur(6px);padding:7px 12px;border-radius:14px;border:1px solid #E8E6E1;font-family:Outfit;font-size:9px;display:flex;gap:10px;color:#57534E;flex-wrap:wrap';d.innerHTML='<span style="display:flex;align-items:center;gap:3px"><i style="width:8px;height:8px;border-radius:50%;background:#0A1A2F;display:inline-block"></i>Hub</span><span style="display:flex;align-items:center;gap:3px"><i style="width:8px;height:8px;border-radius:50%;background:#166534;display:inline-block"></i>Covered</span><span style="display:flex;align-items:center;gap:3px"><i style="width:8px;height:8px;border-radius:50%;background:#B91C1C;opacity:.4;display:inline-block"></i>Uncovered</span>';return d;};
    leg.addTo(rmap);
    rmap.on('click',function(e){if(rClickMode)return;const name=prompt(lang==='en'?'Hub name:':'Nom du hub:');if(!name)return;rHubs.push({name,lat:e.latlng.lat,lng:e.latlng.lng});renderRadius();});
  }
  setTimeout(()=>{rmap.invalidateSize();renderRadius();},150);
}

function renderRadius(){
  if(!rmap)return;
  rCircles.forEach(c=>rmap.removeLayer(c));rCircles=[];
  rMarkers.forEach(m=>rmap.removeLayer(m));rMarkers=[];
  const items=mdvs.filter(m=>m.lat&&m.lng);
  const miles2meters=rRadius*1609.34;
  const hubCounts=[];

  rHubs.forEach((h,hi)=>{
    const circle=L.circle([h.lat,h.lng],{radius:miles2meters,color:'#0A1A2F',weight:1.5,fillColor:'#0A1A2F',fillOpacity:0.06,dashArray:'4 4'}).addTo(rmap);
    rCircles.push(circle);
    const mk=L.marker([h.lat,h.lng],{icon:L.divIcon({className:'',html:'<div style="width:14px;height:14px;border-radius:50%;background:#0A1A2F;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>',iconSize:[14,14],iconAnchor:[7,7]})}).addTo(rmap);
    mk.bindTooltip(h.name,{permanent:true,direction:'top',offset:[0,-10],className:'hub-tooltip'});
    rMarkers.push(mk);
    const count=items.filter(m=>haversine(h.lat,h.lng,m.lat,m.lng)<=rRadius).length;
    hubCounts.push({name:h.name,count,idx:hi});
  });

  const coveredSet=new Set();
  items.forEach(m=>{for(const h of rHubs){if(haversine(h.lat,h.lng,m.lat,m.lng)<=rRadius){coveredSet.add(m.id||m.name);break;}}});

  items.forEach(m=>{
    const isCov=coveredSet.has(m.id||m.name);
    let color,radius,opacity;
    if(rHeatmap){
      const sales=m.salesLastYear||0;
      const t=Math.min(sales/100,1);
      const r=Math.round(66+t*(239-66));
      const g=Math.round(165+t*(83-165));
      const b=Math.round(245+t*(80-245));
      color='rgb('+r+','+g+','+b+')';
      radius=Math.max(3,Math.min(14,3+t*11));
      opacity=0.5+t*0.4;
    }else{
      color=isCov?'#166534':'#B91C1C';
      radius=4;
      opacity=isCov?0.7:0.3;
    }
    const mk=L.circleMarker([m.lat,m.lng],{radius:radius,fillColor:color,color:rHeatmap?'rgba(255,255,255,0.4)':'#fff',weight:rHeatmap?0.5:1,fillOpacity:opacity}).addTo(rmap);
    mk.bindTooltip(m.name+(m.salesLastYear?' ('+m.salesLastYear+' sales/yr)':''),{direction:'top',offset:[0,-4]});
    rMarkers.push(mk);
  });

  const Lx=t();
  const hint=document.getElementById('rhint');
  hint.textContent=lang==='en'?'Click map to add a hub':'Cliquer sur la carte pour ajouter un hub';

  let ph='<div class="rp-h">'+(lang==='en'?'Coverage':'Couverture')+'</div>';
  hubCounts.forEach(h=>{
    ph+='<div class="rp-hub"><span class="n">'+esc(h.name)+'</span><span style="display:flex;align-items:center"><span class="c">'+h.count+'</span><button class="x" data-hi="'+h.idx+'">\u2715</button></span></div>';
  });
  ph+='<button class="rp-add" id="rp-add-btn">'+(lang==='en'?'+ click map to add hub':'+ cliquer carte pour ajouter')+'</button>';
  ph+='<div class="rp-total"><span>'+(lang==='en'?'Covered':'Couvert')+'</span><span class="c g">'+coveredSet.size+' / '+items.length+'</span></div>';
  ph+='<div class="rp-total"><span>'+(lang==='en'?'Uncovered':'Hors zone')+'</span><span class="c r">'+(items.length-coveredSet.size)+'</span></div>';
  ph+='<div class="rp-slider" style="border-top:none;padding-top:0"><label>Hotspots</label><div style="flex:1"></div><button id="r-heat" style="font-family:Outfit,sans-serif;font-size:9px;padding:3px 10px;border-radius:10px;border:1px solid '+(rHeatmap?'#B91C1C':'#E8E6E1')+';background:'+(rHeatmap?'#FCEBEB':'transparent')+';color:'+(rHeatmap?'#B91C1C':'#78716C')+';cursor:pointer">'+(rHeatmap?(lang==='en'?'ON':'ON'):(lang==='en'?'OFF':'OFF'))+'</button></div>';
ph+='<div class="rp-slider"><label>Radius</label><input type="range" min="20" max="200" value="'+rRadius+'" step="5" id="r-slider"><span id="r-val">'+rRadius+' mi</span></div>';

  document.getElementById('rpanel').innerHTML=ph;

  document.getElementById('r-slider').addEventListener('input',function(e){rRadius=parseInt(e.target.value);document.getElementById('r-val').textContent=rRadius+' mi';renderRadius();});
document.getElementById('r-heat').addEventListener('click',function(){rHeatmap=!rHeatmap;renderRadius();});
  document.querySelectorAll('.rp-hub .x').forEach(b=>b.addEventListener('click',function(e){e.stopPropagation();const hi=parseInt(this.dataset.hi);rHubs.splice(hi,1);renderRadius();}));
}
