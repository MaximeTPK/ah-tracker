<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Auction Houses</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF8;--bg2:#F4F3F0;--card:#fff;--brd:#E8E6E1;--brd2:#D4D1CA;
--t1:#1C1917;--t2:#57534E;--t3:#A8A29E;--nv:#0A1A2F;--nv2:rgba(10,26,47,0.06);
--grn:#166534;--grn-bg:#EAF3DE;--blu:#1D4ED8;--blu-bg:#E6F1FB;
--pur:#6D28D9;--pur-bg:#EEEDFE;--amb:#B45309;--amb-bg:#FAEEDA;
--red:#B91C1C;--red-bg:#FCEBEB;--gry:#78716C;--gry-bg:#F1EFE8;
--r:6px;--rl:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex}

.auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
.auth.hid{opacity:0;pointer-events:none}
.auth-box{text-align:center;width:300px}
.auth-box .br{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:20px}
.auth-box h1{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:4px;color:var(--nv)}
.auth-box p{font-size:12px;color:var(--t3);margin-bottom:24px}
.auth-in{width:100%;font-family:'Outfit',sans-serif;font-size:13px;padding:11px 14px;border-radius:var(--r);border:1px solid var(--brd);background:var(--bg2);color:var(--t1);outline:none;text-align:center;letter-spacing:2px}
.auth-in:focus{border-color:var(--nv)}
.auth-err{font-size:11px;color:var(--red);margin-top:8px;height:16px}

.app{display:none;flex:1}
.app.on{display:flex}

/* SIDEBAR */
.sb{width:54px;background:var(--nv);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;flex-shrink:0}
.sb-logo{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.sb-logo div{width:10px;height:10px;border-radius:2px;background:#fff}
.sb-btn{width:36px;height:36px;border-radius:7px;border:none;background:transparent;color:rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sb-btn:hover{color:rgba(255,255,255,.6);background:rgba(255,255,255,.05)}
.sb-btn.on{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85)}
.sb-spacer{flex:1}
.sb-lang{width:36px;height:20px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;letter-spacing:.5px}
.sb-lang:hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 20px 0;display:flex;align-items:center;justify-content:space-between}
.topbar .br{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--t3)}
.topbar h1{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--nv);margin-top:1px}
.btn-p{font-size:11px;font-weight:600;padding:7px 16px;border-radius:14px;border:none;background:var(--nv);color:#fff;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif}
.btn-p:hover{opacity:.85}

/* ALERTS */
.alerts{padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;font-size:11px}
.al{padding:3px 10px;border-radius:10px;font-weight:500}

/* TOOLBAR */
.tb{padding:4px 20px 10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pill{font-family:'Outfit',sans-serif;font-size:10px;font-weight:500;padding:4px 10px;border-radius:12px;border:1px solid var(--brd);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s}
.pill:hover{color:var(--t2);border-color:var(--brd2)}
.pill.on{background:var(--nv);color:#fff;border-color:var(--nv)}
.srch{flex:1;min-width:140px;position:relative}
.srch input{width:100%;font-family:'Outfit',sans-serif;font-size:11px;padding:6px 10px 6px 28px;border-radius:14px;border:1px solid var(--brd);background:var(--bg2);color:var(--t1);outline:none}
.srch input:focus{border-color:var(--nv)}
.srch input::placeholder{color:var(--t3)}
.srch svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3)}

/* VIEWS */
.vpan{display:none;flex:1;padding:0 20px 20px;overflow-y:auto}
.vpan.on{display:block}

/* KANBAN */
.kan{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}
.kcol{background:var(--bg2);border-radius:var(--rl);padding:8px}
.kch{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 3px}
.kct{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}
.kcn{font-size:9px;font-weight:600;padding:2px 6px;border-radius:8px}
.kc{background:var(--card);border:0.5px solid var(--brd);border-radius:0 var(--r) var(--r) 0;padding:10px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.kc:last-child{margin-bottom:0}
.kc:hover{border-color:var(--brd2);box-shadow:0 2px 8px rgba(0,0,0,.04);transform:translateY(-1px)}
.kc-name{font-size:13px;font-weight:600;margin-bottom:2px}
.kc-loc{font-size:10px;color:var(--t3);margin-bottom:4px}
.kc-stars{font-size:11px;color:var(--nv);letter-spacing:.5px}
.kc-badge{font-size:8px;font-weight:600;padding:2px 6px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px;display:inline-block;margin-left:4px}
.kc-next{border-top:0.5px solid var(--brd);margin-top:6px;padding-top:6px}
.kc-nl{font-size:9px;color:var(--t3)}
.kc-na{font-size:11px;font-weight:500;margin-top:1px}
.kc-nd{font-size:10px;margin-top:1px}
.kc-nd.od{color:var(--red);font-weight:600}
.kc-nd.ok{color:var(--t3)}
.kc-rev{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--grn);margin-top:5px}
.kc-note{font-size:10px;color:var(--t3);font-style:italic;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kc-empty{text-align:center;padding:20px 6px;color:var(--t3);font-size:10px}

/* BOTTOM ZONE */
.bz{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bzs{background:var(--bg2);border-radius:var(--rl);padding:8px}
.bzt{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.bzc{display:flex;flex-wrap:wrap;gap:6px}
.bzcard{background:var(--card);border:0.5px solid var(--brd);border-radius:0 var(--r) var(--r) 0;padding:9px 10px;cursor:pointer;transition:all .15s;min-width:170px;flex:1}
.bzcard:hover{border-color:var(--brd2);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.bz-empty{text-align:center;padding:14px;color:var(--t3);font-size:10px}

/* PARTNERS ROW */
.prow{margin-bottom:10px}
.prow-title{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.prow-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}

/* MAP */
.map-wrap{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);height:100%;min-height:500px;overflow:hidden}
.map-wrap .leaflet-container{height:100%;width:100%;border-radius:var(--rl)}
.mpop-name{font-family:'Playfair Display',serif;font-weight:700;font-size:13px;margin-bottom:3px}
.mpop-d{font-family:'Outfit',sans-serif;font-size:11px;color:var(--t2);line-height:1.6}
.mpop-d strong{color:var(--t1)}
.mpop-btn{font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;margin-top:6px;padding:4px 12px;border-radius:8px;border:none;background:var(--nv);color:#fff;cursor:pointer}

/* LIST */
.lt{width:100%;border-collapse:collapse;font-size:11px}
.lt th{text-align:left;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);padding:6px 8px;border-bottom:2px solid var(--brd)}
.lt td{padding:8px;border-bottom:0.5px solid var(--brd);vertical-align:middle}
.lt tr:hover{background:var(--bg2);cursor:pointer}
.lt tr:last-child td{border-bottom:none}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(28,25,23,.3);backdrop-filter:blur(3px);z-index:100;align-items:center;justify-content:center}
.mo.open{display:flex}
.mo-box{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:24px;width:540px;max-width:94vw;max-height:88vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.1);animation:mIn .2s ease-out}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:none}}
.mo-box h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:16px;color:var(--nv)}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t2);margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;font-family:'Outfit',sans-serif;font-size:12px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--brd);background:var(--bg2);color:var(--t1);outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--nv)}
.fg textarea{resize:vertical;min-height:44px}
.fg select{cursor:pointer}
.fr{display:grid;gap:8px}
.fr2{grid-template-columns:1fr 1fr}
.fr3{grid-template-columns:1fr 1fr 1fr}
.fsep{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin:14px 0 8px;padding-top:10px;border-top:0.5px solid var(--brd)}
.mo-ft{display:flex;gap:6px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:0.5px solid var(--brd)}
.mo-ft .del{margin-right:auto;font-family:'Outfit',sans-serif;font-size:10px;padding:7px 12px;border-radius:var(--r);border:1px solid var(--red-bg);background:transparent;color:var(--red);cursor:pointer}
.mo-ft .del:hover{background:var(--red-bg)}
.btn-c{font-family:'Outfit',sans-serif;font-size:11px;padding:7px 16px;border-radius:var(--r);border:1px solid var(--brd);background:transparent;color:var(--t2);cursor:pointer}
.btn-s{font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;padding:7px 18px;border-radius:var(--r);border:none;background:var(--nv);color:#fff;cursor:pointer}

.csv-drop{border:2px dashed var(--brd);border-radius:var(--r);padding:28px 14px;text-align:center;cursor:pointer;transition:all .2s}
.csv-drop:hover,.csv-drop.ov{border-color:var(--nv);background:var(--nv2)}
.csv-drop p{font-size:12px;color:var(--t2);margin-top:6px}
.csv-drop span{font-size:10px;color:var(--t3)}
.csv-res{margin-top:12px;padding:10px;background:var(--grn-bg);border-radius:var(--r);font-size:12px;color:var(--grn);font-weight:500}

.toast{position:fixed;bottom:16px;right:16px;padding:8px 16px;border-radius:var(--r);font-size:11px;font-weight:500;color:#fff;background:var(--nv);box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(50px);opacity:0;transition:all .3s;z-index:200}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:var(--red)}

@media(max-width:900px){.kan{grid-template-columns:1fr 1fr}.bz{grid-template-columns:1fr}}
@media(max-width:640px){.kan{grid-template-columns:1fr}.topbar,.alerts,.tb,.vpan{padding-left:12px;padding-right:12px}.sb{width:44px}}
</style>
</head>
<body>

<div class="auth" id="auth">
<div class="auth-box">
<div class="br">ThePackengers</div>
<h1 style="font-family:'Playfair Display',serif">Auction Houses</h1>
<p>CRM — Restricted access</p>
<input type="password" class="auth-in" id="auth-pw" placeholder="• • • • • •" autofocus>
<div class="auth-err" id="auth-err"></div>
</div>
</div>

<div class="app" id="app">
<nav class="sb">
<div class="sb-logo"><div></div></div>
<button class="sb-btn on" data-v="kanban" title="Kanban"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="10" rx="1"/></svg></button>
<button class="sb-btn" data-v="map" title="Map"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/></svg></button>
<button class="sb-btn" data-v="list" title="List"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
<div class="sb-spacer"></div>
<button class="sb-lang" id="lang-btn" title="Language">EN</button>
<button class="sb-btn" id="sb-csv" title="Import CSV"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
<button class="sb-btn" id="sb-exp" title="Export"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
<label class="sb-btn" title="Import JSON"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><input type="file" id="json-imp" accept=".json" style="display:none"></label>
</nav>

<div class="main">
<div class="topbar"><div><div class="br">ThePackengers</div><h1 id="page-title">Auction Houses</h1></div><button class="btn-p" id="btn-add"></button></div>
<div class="alerts" id="alerts"></div>
<div class="tb">
<div style="display:flex;gap:3px" id="pills"></div>
<div class="srch"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="search" placeholder=""></div>
</div>
<div class="vpan on" id="v-kanban"><div id="kan-root"></div></div>
<div class="vpan" id="v-map"><div class="map-wrap"><div id="map" style="height:100%;width:100%"></div></div></div>
<div class="vpan" id="v-list"><div id="list-root"></div></div>
</div>
</div>

<div class="mo" id="mo"><div class="mo-box">
<h2 id="mo-title"></h2><input type="hidden" id="f-id">
<div class="fr fr2"><div class="fg"><label id="lbl-name"></label><input id="f-name"></div><div class="fg"><label>Score (1-5)</label><select id="f-score"><option value="1">★</option><option value="2">★★</option><option value="3" selected>★★★</option><option value="4">★★★★</option><option value="5">★★★★★</option></select></div></div>
<div class="fg"><label id="lbl-addr"></label><input id="f-addr"></div>
<div class="fr fr3"><div class="fg"><label id="lbl-city"></label><input id="f-city"></div><div class="fg"><label id="lbl-state"></label><input id="f-state"></div><div class="fg"><label>Website</label><input id="f-web"></div></div>

<div class="fr fr2"><div class="fg"><label id="lbl-status"></label><select id="f-status"></select></div><div class="fg"><label id="lbl-integ"></label><select id="f-integ"><option value="">—</option></select></div></div>
<div class="fsep" id="lbl-next-sep"></div>
<div class="fr fr2"><div class="fg"><label>Action</label><input id="f-action"></div><div class="fg"><label id="lbl-due"></label><input id="f-due" type="date"></div></div>

<div class="fsep">Notes</div>
<div class="fg"><textarea id="f-notes"></textarea></div>
<div class="mo-ft"><button class="del" id="btn-del" style="display:none"></button><button class="btn-c" id="btn-cancel"></button><button class="btn-s" id="btn-save"></button></div>
</div></div>

<div class="mo" id="csv-mo"><div class="mo-box" style="width:420px">
<h2 id="csv-title"></h2>
<p style="font-size:12px;color:var(--t2);margin-bottom:14px" id="csv-desc"></p>
<div class="csv-drop" id="csv-drop"><p id="csv-drop-text"></p><span id="csv-drop-hint"></span></div>
<input type="file" id="csv-file" accept=".csv" style="display:none">
<div id="csv-res"></div>

</div></div>

    if(cds.length)cds.forEach(m=>{h+=kcard(m,bc);});else h+=`<div class="kc-empty">${L.kanban.empty}</div>`;

  });
  h+=`</div>`;

    if(!ref.length)h+=`<div class="bz-empty">${L.kanban.none}</div>`;
    h+=`</div></div>`;
  }
  if(fSt==='all'||fSt==='dormant'){
    h+=`<div class="bzs"><div class="bzt">❄️ ${L.pipe.dormant} <span class="kcn" style="background:var(--gry-bg);color:var(--gry)">${dor.length}</span></div><div class="bzc">`;
    dor.forEach(m=>{h+=`<div class="bzcard" style="border-left:3px solid var(--gry)" onclick="openMo(mdvs.find(x=>x.id==='${m.id}'))"><div class="kc-name">${esc(m.name)}</div><div class="kc-loc">${m.integ?L.integ[m.integ]:''}</div>${m.revenue?`<div class="kc-rev">${fmt$(m.revenue)}/mo</div>`:''}</div>`;});
    if(!dor.length)h+=`<div class="bz-empty">${L.kanban.none}</div>`;
    h+=`</div></div>`;
  }
  h+=`</div>`;
  root.innerHTML=h;
}
function kcard(m,bc){
  const L=t(),o=od(m.due);
  let h=`<div class="kc" style="border-left:3px solid ${bc}" onclick="openMo(mdvs.find(x=>x.id==='${m.id}'))">`;
  h+=`<div class="kc-name">${esc(m.name)}</div><div class="kc-loc">${esc(m.city||'')}${m.state?', '+esc(m.state):''}</div>`;
  h+=`<div style="display:flex;align-items:center;gap:4px"><span class="kc-stars">${stars(m.score)}</span>${ibadge(m.integ)}</div>`;

  if(m.notes)h+=`<div class="kc-note">${esc(m.notes.slice(0,55))}${m.notes.length>55?'…':''}</div>`;
  h+=`</div>`;return h;
}

// Geocode address using Nominatim (free, no API key)
async function geocode(addr,city,state){
  if(!addr&&!city)return null;
  const q=encodeURIComponent([addr,city,state,'USA'].filter(Boolean).join(', '));
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`);
    const d=await r.json();
    if(d&&d[0])return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
  }catch(e){}
  return null;
}

document.getElementById('btn-save').addEventListener('click',async()=>{
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast(lang==='en'?'Name required':'Nom requis',1);return;}
  const addr=document.getElementById('f-addr').value.trim();
  const city=document.getElementById('f-city').value.trim();
  const state=document.getElementById('f-state').value.trim();
  const data={name,score:parseInt(document.getElementById('f-score').value)||3,addr,city,state,web:document.getElementById('f-web').value.trim(),lat:null,lng:null,status:document.getElementById('f-status').value,integ:document.getElementById('f-integ').value,action:document.getElementById('f-action').value.trim(),due:document.getElementById('f-due').value,reason:document.getElementById('f-reason').value,rd:document.getElementById('f-rd').value.trim(),retry:document.getElementById('f-retry').value,contact:{n:document.getElementById('f-cn').value.trim(),e:document.getElementById('f-ce').value.trim(),p:document.getElementById('f-cp').value.trim()},notes:document.getElementById('f-notes').value.trim()};
  
  // Geocode if address/city provided
  const geo=await geocode(addr,city,state);
  if(geo){data.lat=geo.lat;data.lng=geo.lng;}

  const eid=document.getElementById('f-id').value;
  if(eid){const i=mdvs.findIndex(m=>m.id===eid);if(i>-1){
    // Keep existing coords if geocoding failed and coords already exist
    if(!data.lat&&mdvs[i].lat){data.lat=mdvs[i].lat;data.lng=mdvs[i].lng;}
    mdvs[i]={...mdvs[i],...data};
  }toast(lang==='en'?'Updated':'Modifié');}
  else{mdvs.push({id:u(),...data,revenue:0,lastOrder:'',orderCount:0});toast(lang==='en'?'Added':'Ajouté');}
  sv();renderAll();closeMo();
});
document.getElementById('btn-del').addEventListener('click',()=>{const eid=document.getElementById('f-id').value;if(!eid||!confirm(lang==='en'?'Delete?':'Supprimer ?'))return;mdvs=mdvs.filter(m=>m.id!==eid);sv();renderAll();closeMo();toast(lang==='en'?'Deleted':'Supprimé');});

// ═══ CSV ═══
const csvMo=document.getElementById('csv-mo');
document.getElementById('sb-csv').addEventListener('click',()=>csvMo.classList.add('open'));
document.getElementById('csv-close').addEventListener('click',()=>csvMo.classList.remove('open'));
csvMo.addEventListener('click',e=>{if(e.target===csvMo)csvMo.classList.remove('open');});
const csvDrop=document.getElementById('csv-drop'),csvF=document.getElementById('csv-file');
csvDrop.addEventListener('click',()=>csvF.click());
csvDrop.addEventListener('dragover',e=>{e.preventDefault();csvDrop.classList.add('ov');});
csvDrop.addEventListener('dragleave',()=>csvDrop.classList.remove('ov'));
csvDrop.addEventListener('drop',e=>{e.preventDefault();csvDrop.classList.remove('ov');processCSV(e.dataTransfer.files[0]);});
csvF.addEventListener('change',e=>{if(e.target.files[0])processCSV(e.target.files[0]);e.target.value='';});

function processCSV(file){
  if(!file)return;const reader=new FileReader();
  reader.onload=ev=>{
    const text=ev.target.result,fl=text.split('\n')[0];
    const sep=fl.split(';').length>fl.split(',').length?';':',';
    const lines=text.trim().split('\n');
    const hdrs=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,''));
    const guess=cs=>hdrs.find(h=>cs.some(c=>h.toLowerCase().replace(/[\s_-]/g,'').includes(c)));
    const colO=guess(['ownername','owner','name'])||hdrs[0];
    const colP=guess(['finalprice','final','price','amount'])||hdrs[1];
    const byO={};let parsed=0;
    lines.slice(1).filter(l=>l.trim()).forEach(line=>{
      const vals=line.split(sep).map(v=>v.trim().replace(/^"|"$/g,''));
      const row={};hdrs.forEach((h,i)=>{row[h]=vals[i]||'';});
      const owner=(row[colO]||'').trim();
      const price=parseFloat(String(row[colP]).replace(/[^0-9.\-]/g,''))||0;
      if(!owner)return;if(!byO[owner])byO[owner]={orders:0,revenue:0};
      byO[owner].orders++;byO[owner].revenue+=price;parsed++;
    });
    let matched=0,unm=[];
    Object.entries(byO).forEach(([owner,data])=>{
      const mdv=mdvs.find(m=>m.name.toLowerCase()===owner.toLowerCase());
      if(mdv){mdv.revenue=Math.round(data.revenue);mdv.orderCount=data.orders;mdv.lastOrder=td();matched++;}else{unm.push(owner);}
    });
    sv();renderAll();
    const resEl=document.getElementById('csv-res');const CL=t().csv;
    let msg=`✓ ${parsed} ${CL.orders} → ${matched} ${CL.matched}`;
    if(unm.length)msg+=`<br><span style="color:var(--amb)">⚠ ${unm.length} ${CL.unmatched}: ${unm.slice(0,4).join(', ')}${unm.length>4?'…':''}</span>`;
    resEl.innerHTML=msg;resEl.style.display='block';
    toast(CL.updated+' — '+matched+' MDVs');
  };reader.readAsText(file);
}

document.getElementById('sb-exp').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify({_app:'crm-ah',_v:3,_at:new Date().toISOString(),mdvs},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='crm-auction-houses-'+td()+'.json';a.click();
  toast((lang==='en'?'Exported ':'Exporté ')+mdvs.length);
});
document.getElementById('json-imp').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.mdvs){mdvs=d.mdvs;sv();renderAll();toast((lang==='en'?'Imported ':'Importé ')+mdvs.length);}else toast('Invalid',1);}catch{toast('Invalid',1);}e.target.value='';};r.readAsText(f);
});
